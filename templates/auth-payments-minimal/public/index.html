<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paid Action — SettleMesh starter</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="card">
    <h1>One paid action</h1>
    <p class="sub">The smallest possible paid app: sign in, run one action, pay from your wallet.</p>

    <!-- Logged-out: the sign-in branch. Sending the user to /__settle/login is all auth takes. -->
    <section id="signin" hidden>
      <p>Sign in to run the action. It's billed to <strong>your</strong> Aev wallet.</p>
      <a class="btn" href="/__settle/login">Sign in with SettleMesh</a>
    </section>

    <!-- Logged-in: the charge branch. -->
    <section id="app" hidden>
      <button id="run" class="btn">Run paid action <span id="price" class="price"></span></button>
      <p id="spent" class="chip" hidden>⬡ <span id="spentval">0</span> Aev spent this session</p>
      <pre id="out" class="out" hidden></pre>
      <p id="err" class="err" hidden></p>
    </section>

    <!--
      Optional badge — delete this footer block to remove the "Powered by SettleMesh" credit.
      It is user-space (you own it) and removing it is fine.
    -->
    <footer class="badge">
      <a href="https://settlemesh.io/?utm_source=template&amp;utm_medium=badge"
         target="_blank" rel="noopener noreferrer">Powered by SettleMesh</a>
    </footer>
  </main>

  <script src="/app.js"></script>
</body>
</html>
